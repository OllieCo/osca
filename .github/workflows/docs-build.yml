name: Docs — build + broken-link check

# Story: Documentation Site — CI gate
# Runs on every PR touching docs-site/ files.
# Fails if Astro build errors OR if any internal link is broken.

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
  pull_request:
    paths:
      - "docs-site/**"
  workflow_dispatch:

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs-site/package.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm install

      - name: Build
        working-directory: docs-site
        run: npm run build
        # Build output goes to docs-site/dist/

      - name: Broken-link check
        working-directory: docs-site
        run: |
          # lychee checks all internal links in the built output.
          # External links are skipped in CI (too slow, network-dependent).
          npx lychee --offline --no-progress dist/**/*.html
        # Install lychee if not available: npm install -g @lychee-project/lychee
        # For now, use the npm wrapper — swap to the binary in prod if faster.
        continue-on-error: false

      - name: Upload built docs (artifact)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: docs-dist
          path: docs-site/dist/
          retention-days: 7
