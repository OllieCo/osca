name: DOM Resilience — Selector & Fixture Tests

on:
  push:
    paths:
      - "extension/**"
      - ".github/workflows/dom-resilience.yml"
  pull_request:
    paths:
      - "extension/**"
      - ".github/workflows/dom-resilience.yml"

jobs:
  selector-tests:
    name: Selector fixture tests (jsdom)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dev deps
        run: npm ci

      - name: Run selector + scraper tests
        run: npm test

      # fixture-diff only runs when a fixtures/v2 directory exists.
      # It exits 0 (cleanly) when v2 is absent, so this step never blocks
      # the build on a branch that hasn't added v2 fixtures yet.
      - name: Run fixture-diff (v1 → v2)
        run: node scripts/fixture-diff.mjs --from fixtures/v1 --to fixtures/v2
