name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ─── Story 3.1 + 3.2: release-please ─────────────────────────────────────
  # Creates version-bump PRs from conventional commits; generates CHANGELOG.md
  # and posts it to GitHub Release notes automatically.
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      upload_url: ${{ steps.rp.outputs.upload_url }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          release-type: node
          # Paths where release-please looks for the version field
          extra-files: |
            extension/manifest.json

  # ─── Story 3.3: Extension packaging + SHA-256 ────────────────────────────
  # Runs only when release-please actually created a release (not just a PR).
  publish:
    name: Package & Publish
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      # ── Build server ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Build server
        working-directory: server
        run: npm ci && npm run build

      # ── Build client ──────────────────────────────────────────────────────
      - name: Build client
        working-directory: client
        run: npm ci && npm run build

      # ── Package extension .zip ────────────────────────────────────────────
      - name: Package extension
        run: |
          VERSION=${{ needs.release-please.outputs.tag_name }}
          ZIP_NAME="dispatcher-extension-${VERSION}.zip"
          cd extension
          zip -r "../${ZIP_NAME}" manifest.json src/ permissions-rationale.md
          cd ..
          sha256sum "${ZIP_NAME}" > "${ZIP_NAME}.sha256"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      # ── Attach artefacts to GitHub Release ───────────────────────────────
      - name: Upload extension .zip to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.ZIP_NAME }}.sha256

      # ── Story 3.3.4: Docker image versions in release notes ───────────────
      - name: Append Docker image versions to release notes
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.release-please.outputs.tag_name }}';
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });
            const dockerNote = [
              '',
              '## Docker image versions',
              '| Service | Image |',
              '|---|---|',
              '| postgres | `postgres:16-alpine` |',
              '| redis | `redis:7-alpine` |',
              '| ollama | `ollama/ollama:0.9.0` |',
            ].join('\n');
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: release.body + dockerNote,
            });
