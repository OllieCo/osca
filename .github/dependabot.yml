version: 2
updates:
  # Server — Express API
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      patch-minor:
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  # Client — React frontend
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      patch-minor:
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  # Evals — LLM evaluation harness
  - package-ecosystem: "npm"
    directory: "/evals"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      patch-minor:
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  # GitHub Actions — workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
